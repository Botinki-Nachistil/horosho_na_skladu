services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warehouse_db}
      POSTGRES_USER: ${POSTGRES_USER:-warehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warehouse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries:  5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  django:
    build:
      context: ./django_part
      target: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DEBUG: "1"
      POSTGRES_DB: warehouse_db
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      TZ: Europe/Moscow
      JWT_SECRET: jwt-secret-change-me-at-least-32-bytes
    ports:
      - "8001:8001"
    volumes:
      - ./django_part:/app
    command: ["sh", "./docker-entrypoint.sh", "python", "manage.py", "runserver", "0.0.0.0:8001"]

  fastapi:
    build:
      context: ./fastapi_part
      target:  development
    volumes:
      - ./fastapi_part:/app
    env_file: .env
    expose:
      - "8001"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  flask:
    build:
      context: ./flask_part
      target:  development
    volumes:
      - ./flask_part:/app
    env_file: .env
    expose:
      - "8002"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data: