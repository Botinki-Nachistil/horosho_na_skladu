services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: warehouse_db
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse -d warehouse_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  django:
    build:
      context: ./django_part
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEBUG: "1"
      POSTGRES_DB: warehouse_db
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      TZ: Europe/Moscow
      JWT_SECRET: jwt-secret-change-me-at-least-32-bytes
    ports:
      - "8001:8001"
    volumes:
      - ./django_part:/app
    command: ["./docker-entrypoint.sh", "python", "manage.py", "runserver", "0.0.0.0:8001"]

volumes:
  postgres_data:
