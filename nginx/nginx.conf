upstream django {
    server django:8001;
}

upstream fastapi {
    server fastapi:8003;
}

upstream flask {
    server flask:8002;
}

server {
    listen 80;

    # FastAPI: только реализованные endpoints
    location /api/v1/mobile/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://fastapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Flask: только реализованные endpoints
    location /api/v1/incidents/ {
        proxy_pass http://flask;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Всё остальное — Django (включая /tasks/, /waves/, /routes/, /kpi/, /integrations/)
    location /api/v1/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
